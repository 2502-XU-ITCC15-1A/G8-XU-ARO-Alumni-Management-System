version: "3.8"

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    stdin_open: true

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: